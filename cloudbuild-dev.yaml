steps:

# 1. Compilar imagen de Docker usando el SHA corto del commit como tag

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/repo-dev/app:$SHORT_SHA', '.']

# 2. Subir el contenedor resultante al Artifact Registry de Desarrollo

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/repo-dev/app:$SHORT_SHA']

# 3. Ordenar el despliegue a App Engine apuntando al servicio alternativo "desarrollo"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['app', 'deploy', '--image-url=us-central1-docker.pkg.dev/$PROJECT_ID/repo-dev/app:$SHORT_SHA', '--service=desarrollo', '--quiet']

timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
